name: Generate Snake Animation

on:
  schedule:
    # Se ejecuta automáticamente cada día a medianoche UTC
    - cron: "0 0 * * *"
  
  # Permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:
  
  # También se ejecuta cuando haces push a main
  push:
    branches:
      - main

# Solución temporal para el warning de Node 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    # Permisos necesarios para escribir en el repositorio
    permissions:
      contents: write
    
    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Genera el snake animation usando tus contribuciones reales
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      
      # 3. Publica el resultado en la rama 'output' (MÉTODO CORREGIDO)
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
          commit_message: "🐍 Update snake animation [skip ci]"
